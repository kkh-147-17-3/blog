# kh.log — Supabase project config
# Replace `project_id` with your project ref (Supabase Dashboard → Settings → General → Reference ID)

project_id = "fhuoxlduceegczdiqkal"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
